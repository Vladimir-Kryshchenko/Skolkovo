name: Skolkovo Fetch

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
  QDRANT_URL: ${{ secrets.QDRANT_URL }}
  TEI_URL: ${{ secrets.TEI_URL }}

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - run: |
          sudo apt-get update && sudo apt-get install -y chromium-browser
          go build -o skolkovo ./cmd/skolkovo
          ./skolkovo scrape
          ./skolkovo fetch
          ./skolkovo index
        env:
          SOURCE_URL: https://dochub.sk.ru/foundation/documents/
          STORE_BACKEND: postgres
          DOCS_DIR: ./Документы_Сколково
          CHROME_PATH: /usr/bin/chromium-browser
