# Продакшен-развёртывание «База Сколково» (тестовый сервер 213.136.75.7).
#
# Отличия от deploy/docker-compose.yml (локальная разработка):
#   * внутренние сервисы (qdrant, tei, postgres, skolkovo) НЕ публикуют порты на хост —
#     доступ только внутри docker-сети `internal`;
#   * наружу торчит ТОЛЬКО nginx (80 → 443), который терминирует HTTPS
#     (self-signed сертификат) и проксирует MCP и админку;
#   * секреты берутся из deploy/.env (создаётся скриптом deploy/deploy.sh).
#
# Запуск:  docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --build

name: baza-skolkovo

services:
  # Векторная БД
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [internal]

  # Локальные эмбеддинги multilingual-e5 (HuggingFace TEI, CPU)
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.7
    restart: unless-stopped
    command: ["--model-id", "intfloat/multilingual-e5-base"]
    environment:
      # Явный эндпоинт HF — иначе hf-hub падает с "relative URL without a base".
      HF_ENDPOINT: https://huggingface.co
    volumes:
      - tei_data:/data
    networks: [internal]

  # Реестр метаданных и БД админки
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Сам сервис: планировщик + открытый MCP + админка
  skolkovo:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      tei:
        condition: service_started
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-skolkovo_docs}
      SITEPAGES_COLLECTION: ${SITEPAGES_COLLECTION:-skolkovo_sitepages}
      SITEPAGES_ENABLED: ${SITEPAGES_ENABLED:-true}
      SITEPAGES_SEEDS: ${SITEPAGES_SEEDS:-https://sk.ru/,https://dochub.sk.ru/foundation/documents/}
      SITEPAGES_MAX_PAGES: ${SITEPAGES_MAX_PAGES:-0}
      TEI_URL: http://tei:80
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      POSTGRES_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      STORE_BACKEND: ${STORE_BACKEND:-postgres}
      MCP_ADDR: ":8080"
      MCP_API_KEY: ${MCP_API_KEY}
      MCP_RATE_LIMIT_RPS: ${MCP_RATE_LIMIT_RPS:-5}
      ADMIN_ADDR: ":8090"
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NEWS_RSS_URL: ${NEWS_RSS_URL:-https://sk.ru/news/rss/}
      NOTIFY_WEBHOOK: ${NOTIFY_WEBHOOK:-}
      DOCS_DIR: /data/docs
      REGISTRY_PATH: /data/docs/Метаданные/реестр_документов.json
      REPORT_DIR: /data/reports
    volumes:
      - docs_data:/data/docs
      - reports_data:/data/reports
    networks: [internal]

    # Reverse-proxy + TLS. Единственный публичный вход.
  # Для Let's Encrypt: замените volume certs → certbot и используйте nginx-letsencrypt.conf
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - skolkovo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-letsencrypt.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN:-skolkovo.example.com}
    networks: [internal]

  # ─── Monitoring Stack ────────────────────────────────────────────────

  # Prometheus: сбор метрик
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    networks: [internal]

  # Grafana: визуализация
  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-}
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  qdrant_data:
  tei_data:
  pg_data:
  docs_data:
  reports_data:
  certbot-webroot:
  prometheus_data:
  grafana_data:
