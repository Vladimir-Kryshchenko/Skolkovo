# Prometheus configuration for Skolkovo Base monitoring
# Deploy alongside docker-compose.prod.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: skolkovo-prod
    environment: production

# Alert rules
rule_files:
  - "alerts/*.yml"

# Alertmanager (optional — uncomment when Alertmanager is deployed)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - "alertmanager:9093"

scrape_configs:
  # ─── Skolkovo MCP / Admin metrics ─────────────────────────────────────
  - job_name: "skolkovo"
    metrics_path: /metrics
    static_configs:
      - targets: ["skolkovo:8080"]
        labels:
          service: skolkovo-mcp
    scrape_interval: 10s

  # ─── Node Exporter (host metrics: CPU, memory, disk, network) ─────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: node-exporter

  # ─── Qdrant metrics ───────────────────────────────────────────────────
  - job_name: "qdrant"
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: qdrant

  # ─── Prometheus self-monitoring ───────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ─── Nginx metrics (stub_status / vts exporter) ───────────────────────
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: nginx
